<style>
  /* Reset e configurações gerais */
  .geoportal-box-area *, .geoportal-box-area *::before, .geoportal-box-area *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  /* Container principal que alinha os leques lado a lado */
  .geoportal-box-area {
    width: 100%;
    padding: 40px 20px;
    background-color: #f8f9fa;
  }

  .geoportal-box-area .container-horizontal {
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
    gap: 80px; /* Espaço entre cada conjunto de leque */
    justify-content: center;
  }

  /* Estrutura de cada conjunto de leque individual */
  .leque-wrapper {
    position: relative;
    width: 160px;  /* Largura da base do leque */
    height: 220px; /* Altura do leque */
    perspective: 1000px;
  }

  /* Card base (o que fica visível na frente ou serve de capa) */
  .leque-card {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #ffffff;
    border: 1px solid #e0e0e0;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease;
    transform-origin: bottom center; /* Ponto fixo onde o leque rotaciona */
    cursor: pointer;
  }

  /* Títulos e Imagens dentro dos cards */
  .leque-card h3 {
    font-family: Arial, sans-serif;
    font-size: 14px;
    color: #333;
    font-weight: 600;
    line-height: 1.3;
  }

  .leque-card img {
    width: 100%;
    max-height: 80px;
    object-fit: cover;
    border-radius: 6px;
    margin-bottom: 10px;
  }

  /* CONFIGURAÇÃO DA SOBREPOSIÇÃO INICIAL (Empilhados) */
  .card-atras-1 { z-index: 2; }
  .card-atras-2 { z-index: 1; }
  .card-principal { z-index: 3; background: #ffffff; }

  /* EFEITO AO PASSAR O MOUSE (Abertura em Leque) */
  .leque-wrapper:hover .card-atras-1 {
    transform: rotate(-15deg) translate(-25px, -10px);
    box-shadow: -4px 4px 12px rgba(0,0,0,0.12);
  }

  .leque-wrapper:hover .card-atras-2 {
    transform: rotate(15deg) translate(25px, -10px);
    box-shadow: 4px 4px 12px rgba(0,0,0,0.12);
  }

  .leque-wrapper:hover .card-principal {
    transform: scale(1.05);
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    border-color: #007bff; /* Destaca o card do meio ao abrir */
  }
</style>

<div class="geoportal-box-area">
  <div class="container-horizontal">

    <!-- PRIMEIRO LEQUE: Emprego, Renda e Economia -->
    <div class="leque-wrapper">
      <div class="leque-card card-atras-1">
        <h3>Renda</h3>
      </div>
      <div class="leque-card card-atras-2">
        <h3>Economia</h3>
      </div>
      <div class="leque-card card-principal">
        <h3>Emprego</h3>
      </div>
    </div>

    <!-- SEGUNDO LEQUE: Extrativa -->
    <div class="leque-wrapper">
      <div class="leque-card card-atras-1">
        <h3>Mineral</h3>
      </div>
      <div class="leque-card card-atras-2">
        <h3>Vegetal</h3>
      </div>
      <div class="leque-card card-principal">
        <img src="https://gstatic.com" alt="Extrativa">
        <h3>Extrativa</h3>
      </div>
    </div>

    <!-- TERCEIRO LEQUE: Pecuária -->
    <div class="leque-wrapper">
      <div class="leque-card card-atras-1">
        <h3>Corte</h3>
      </div>
      <div class="leque-card card-atras-2">
        <h3>Leite</h3>
      </div>
      <div class="leque-card card-principal">
        <img src="https://planejamento.blog" alt="Pecuária">
        <h3>Pecuária</h3>
      </div>
    </div>

    <!-- QUARTO LEQUE: Produção Animal e Economia -->
    <div class="leque-wrapper">
      <div class="leque-card card-atras-1">
        <img src="https://planejamento.blog" alt="Economia">
        <h3>Economia</h3>
      </div>
      <div class="leque-card card-atras-2">
        <h3>Derivados</h3>
      </div>
      <div class="leque-card card-principal">
        <img src="https://planejamento.blog" alt="Produção de Origem Animal">
        <h3>Produção de Origem Animal</h3>
      </div>
    </div>

  </div>
</div>

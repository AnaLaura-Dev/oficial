<form> 

  <select name="Exames" onChange="atualizarIframe(this)"> 
    <option label="Selecione sua opção" value=""></option> 
    <option value="https://geomapas.portaldoplanejamento.am.gov.br/maps/152/embed#/">opção1</option> 
    <option value="https://geomapas.portaldoplanejamento.am.gov.br/maps/207/embed#/">opção2</option> 
  </select> 
</form> 


<iframe id="abrir" name="abrir" scrolling="auto" src="" width="100%" height="500px"></iframe> 

<script>
  function atualizarIframe(selectElement) {
    //pega o valor da opção selecionada
    var url = selectElement.options[selectElement.selectedIndex].value;
    
    if (url) {
      document.getElementById('abrir').src = url;
    }
  }
</script>
